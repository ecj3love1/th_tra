name: Python YouTube Tracker

on:
  # ⭐️ 핵심: cron-job.org를 사용하므로 깃허브 자체 알람은 중복 실행을 막기 위해 꺼둡니다.
  # schedule:
  #   - cron: '*/10 * * * *' 
  
  # 외부(cron-job.org)에서 원격으로 찌를 수 있게 해주는 문만 열어둡니다.
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 내 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필요한 파이썬 패키지 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: 파이썬 스크립트 실행하기!
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -u tracker.py
