name: Python YouTube Tracker

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 내 코드 가져오기
        uses: actions/checkout@v4  # v3에서 v4로 수정

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5 # v4에서 v5로 수정
        with:
          python-version: '3.10'

      - name: 필요한 파이썬 패키지 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: 파이썬 스크립트 실행하기!
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python tracker.py
